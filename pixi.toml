[workspace]
authors = ["Bacchin Alberto <bacchinalb@dei.unipd.it>, Riccardo Bastianello <riccardo.bastianello@it-robotics.it>"]
channels = ["pytorch", "nvidia", "conda-forge"]
name = "vh-loop"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.8"

# --- 1. GLOBAL BASE (Always Installed) ---
[dependencies]
python = "==3.13.12"
pip = "*"

[pypi-dependencies]
torch = { version = "==2.9.1", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "==0.24.1", index = "https://download.pytorch.org/whl/cu128" }
tqdm = "*"
PyYAML = "*"
hydra-core = ">=1.3"
omegaconf = ">=2.3"
argcomplete = ">=3.6.3"
pydantic = ">=2.0"
opencv-python = ">=4.8.1" # TO BE ADJUSTED
pytest = "*"
albumentations = ">=2.0.5" # TO BE ADJUSTED
matplotlib = ">=3.8.0" # TO BE ADJUSTED
transformers = "==5.7.0"

numpy = ">=2.3.1"
einops = ">=0.8.1" # TO BE ADJUSTED
xformers = ">=0.0.30" # TO BE ADJUSTED
qwen_vl_utils = ">=0.0.14"
#flash_attn = ">=2.7.4.post1" # Takes hours to compile, so we use a pre-built wheel instead.
#flash_attn = { url = "https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.7.16/flash_attn-2.8.3%2Bcu128torch2.9-cp313-cp313-linux_x86_64.whl" } #pre-built wheel for flash-attn, to speedup


accelerate = ">=0.30.0" # TO BE ADJUSTED
bitsandbytes = ">=0.41" # TO BE ADJUSTED
peft = ">=0.6" # TO BE ADJUSTED
trl = "==1.3.0"

pillow = ">=10.0" # TO BE ADJUSTED
pycocotools = ">=2.0" # TO BE ADJUSTED
datasets = "==4.8.5"


[target.linux-64.pypi-dependencies]
flash-attn = { url = "https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.7.16/flash_attn-2.8.3%2Bcu128torch2.9-cp313-cp313-linux_x86_64.whl" }
flash-linear-attention = "==0.5.0" #to speedup qwen 3.5
#causal-conv1d = "==1.6.1" #to speedup qwen 3.5
triton = "==3.5.1"
liger-kernel = "==0.8.0" #TO BE ADJUSTED
post-training-toolkit = {git = "https://github.com/microsoft/post-training-toolkit.git"}
ollama="==0.6.2"

[tasks]
# 1. This task forces the isolated unsloth installation
install-unsloth = "pip install unsloth==2026.5.7 unsloth_zoo==2026.5.4 --no-deps"
install-causal-conv1d = "pip install causal-conv1d==1.6.1 --no-build-isolation -v"
# 2. A setup task that synchronizes the project and installs the package
setup = { depends-on = ["install-unsloth", "install-causal-conv1d"]}


[target.win-64.pypi-dependencies]
flash-attn = { url = "https://huggingface.co/Wildminder/AI-windows-whl/resolve/main/flash_attn-2.8.3%2Bcu128torch2.9.1cxx11abiTRUE-cp313-cp313-win_amd64.whl" }

# --- PATH CONFIGURATION ---
# This ensures 'import src.model_core' works without 'pip install -e .'
[activation]
#scripts = [".pixi/activation.sh"]

env = { PYTHONPATH = "${PYTHONPATH}:${PIXI_PROJECT_ROOT}" }

[target.win-64.activation]
env = { PYTHONPATH = "%PYTHONPATH%;%PIXI_PROJECT_ROOT%" }

# --- 2. LABEL STUDIO ENVIRONMENTS ---

[feature.label-studio]
platforms = ["linux-64"]

[feature.label-studio.dependencies]
git = "*"
wget = "*"

[feature.label-studio.pypi-dependencies]
label-studio = "==1.23.0"

[feature.label-studio.tasks]
start_label_studio = "label-studio"

install_sam2 = "mkdir -p ~/repos && git clone https://github.com/facebookresearch/segment-anything-2.git ~/repos/segment-anything-2 && cd ~/repos/segment-anything-2 && pip install -e ."
install_ls_ml = "git clone https://github.com/HumanSignal/label-studio-ml-backend.git ~/repos/label-studio-ml-backend && cd ~/repos/label-studio-ml-backend && pip install -e . && cd label_studio_ml/examples/segment_anything_2_image && pip install -r requirements.txt"
download_sam2_weights = "cd ~/repos/label-studio-ml-backend/label_studio_ml/examples && mkdir -p checkpoints && cd checkpoints && wget https://dl.fbaipublicfiles.com/segment_anything_2/092824/sam2.1_hiera_large.pt"
start_ml_backend = "cd ~/repos/label-studio-ml-backend/label_studio_ml/examples && label-studio-ml start ./segment_anything_2_image -p 9090"

install_ls = { depends-on = ["install_sam2", "install_ls_ml", "download_sam2_weights"] }


[environments]
label-studio = ["label-studio"]
