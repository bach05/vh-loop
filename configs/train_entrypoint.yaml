defaults:
  - /model: qwen3_5_unsloth # qwen3_5, gemma4
  - /experiment: test_exp
  - /dataset: generic_waste3
  - /transform: null
  - /peft: unsloth_peft
  - /trainer: qwen_sft_trainer # gemma4_sft_trainer, qwen_sft_trainer
  - _self_

train_framework: unsloth # HFTransformers, unsloth
#log_level: info #debug, info, warning, error, critical, set to info or debug for more verbose logging
debug: false #when set to true, the code will run in debug mode, which may include additional logging, reduced dataset size, etc. Set to false for normal operation.
#debug_iters: 100 #number of iterations to run in debug mode, only effective when debug is true
#enable_pbar: false #whether to enable progress bar during training/evaluation, set to false to disable it

exp: v7
exp_name: "${hydra:runtime.choices.model}__${hydra:runtime.choices.dataset}${strip_null:${hydra:runtime.choices.quantization}}__${exp}"

hydra:
  run:
    dir: ${oc.env:MODEL_PATH, /models}/vhloop/experiments/${exp_name}/training