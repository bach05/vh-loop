gt_jsonl: ${oc.env:DATA_PATH, /data}/canonical_datasets/panizzolo2_paniz_test_03_30_single.canonical.reviewed.jsonl #panizzolo/paniz_test_03_30_SINGLE.canonical_v2.jsonl

# Option A: explicit list
predictions:
  - name: qwen_lora_V7
    path: ${oc.env:MODEL_PATH, /models}/vhloop/experiments/qwen3_5_unsloth__generic_waste3__v7/testing/qwen3_5_ft_generic_waste3_preds.jsonl

# Option B: folder search
#predictions_dir: null
#patterns:
#  - "*/testing/*.jsonl" #default pattern

thresholds: [0.1, 0.25, 0.5, 0.75, 0.9]

class_aware: true

hydra:
  run:
    dir: ${oc.env:MODEL_PATH, /models}/vhloop/comparing

output_dir: ${hydra:run.dir}

plots:
  enabled: true

visualization:
  enabled: true

  # If null, paths are resolved relative to current working directory.
  # Use this if ImageAsset.path inside the JSONL is relative.
  image_root: ${oc.env:DATA_PATH, /data}

  # If empty, the script will visualize the first N samples.
  sample_ids: []

  max_samples: 500

  # Options:
  #   best_f1 -> each model uses the threshold that maximizes its F1
  #   fixed   -> all models use fixed_threshold
  threshold_mode: best_f1
  fixed_threshold: 0.5