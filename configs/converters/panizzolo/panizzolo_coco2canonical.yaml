# COCO -> canonical_schema v2 conversion.
# Output format:
#   line 1: DatasetInfoRecord
#   line 2+: DataRecord(sample=SISimpleDataSample(...))
#
# Notes:
# - Bounding boxes are stored in pixel coordinates in the canonical JSONL.
# - During training conversion, SISimpleDataSample.sample_to_message() normalizes
#   them to normalization_factor x normalization_factor and emits tag_bbox_list:
#   <class_name,x1,y1,x2,y2>;...
# - Class names must be compact tokens without spaces. By default, COCO category
#   names are sanitized by replacing invalid characters/spaces with underscores.

- coco_json: /media/iaslab/data_bacchin/panizzolo/paniz_test_03_30_SINGLE.json
  output_jsonl: /media/iaslab/data_bacchin/panizzolo/paniz_test_03_30_SINGLE.canonical_v2.jsonl
  dataset_id: paniz_test_03_30_single
  split: test
  description: "Collect at Panizzolo facility for motor scrap sorting. "
  domain: waste_sorting

  annotation_source: human
  annotation_quality: good

  sample_type: si_simple_data
  prompt_template_version: single_image_dataset_level_prompt_generation
  answer_format: tag_bbox_list
  normalization_factor: 1000

  drop_empty: false

  skip_invalid_bboxes: false
  include_instance_metadata: false
  generate_center_points: true

  sanitize_label_names: true
  label_name_overrides: null
  label_descriptions_yaml: /home/bacchin/vh-loop_env/vh-loop/configs/converters/panizzolo/panizzolo_motor_scrap_v1.yaml
  require_label_descriptions: true
  include_categories: 1,2,3

  sample_id_strategy: image_id
  sample_id_prefix: null

