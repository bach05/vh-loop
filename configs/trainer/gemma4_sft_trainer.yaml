per_device_train_batch_size: 2
gradient_accumulation_steps: 2

learning_rate: 2e-4
weight_decay: 0.01
optim: adamw_torch_fused #optimizer to use, can be 'adamw_torch_fused', 'adamw_torch', 'adamw_apex_fused', 'adamw_apex', or any other optimizer supported by the training framework. The 'fused' versions can be faster on compatible hardware.
max_grad_norm: 0.3 #max gradient norm for gradient clipping, set to 0 to disable gradient clipping
lr_scheduler_type: "constant" #learning rate scheduler type, can be 'linear', 'cosine', 'cosine_with_restarts', 'polynomial', 'constant', or 'constant_with_warmup'

num_train_epochs: 3
max_train_steps: -1 #set to -1 to disable max train steps, otherwise it will override num_train_epochs

bf16: true #set to true to use bf16 precision, which can speed up training and reduce memory usage on compatible hardware. Set to false to use fp16 or fp32 precision depending on the model and hardware capabilities.
fp16: false #set to true to use fp16 precision, which can speed up training and reduce memory usage on compatible hardware. Set to false to use bf16 or fp32 precision depending on the model and hardware capabilities.

gradient_checkpointing: true #set to true to enable gradient checkpointing, which can reduce memory usage during training by trading off computation. Set to false to disable it.

logging_steps: 10 #log training progress every N steps, set to 0 to disable logging
save_steps: 100 #save the model every N steps, set to 0 to disable

eval_strategy: "no" #evaluation strategy, can be 'no', 'steps', or 'epoch'
eval_steps: 0 #evaluate the model every N steps

max_length: null #max length of the input sequences, set to None to use the default max length of the model
dataset_text_field: ""
dataset_kwargs:
    skip_prepare_dataset: True #if true, True, the SFTTrainer assumes your dataset is already tokenized and formatted with the necessary columns (like input_ids, attention_mask, and labels), so it won't attempt to apply its own formatting_func
remove_unused_columns: false #set to true to remove columns from the dataset that are not used by the model's forward method, which can save memory and speed up training. Set to false to keep all columns in the dataset.